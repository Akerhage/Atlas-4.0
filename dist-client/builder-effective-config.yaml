directories:
  output: dist-client
  buildResources: build
appId: com.mydrivingacademy.atlas-client
productName: Atlas Klient
extraMetadata:
  main: main-client.js
asar: true
npmRebuild: false
extraResources:
  - from: .env
    to: .env
  - from: config.json
    to: config.json
files:
  - filter:
      - main-client.js
      - preload.js
      - preload-loader.js
      - package.json
      - Renderer/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: Renderer/assets/icons/app/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
electronVersion: 39.1.2
