<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="loader.css" />
<title>Atlas</title>
</head>
<body>
<div class="card">

<!-- Bakgrundsglöd -->
<div class="bg-glow"></div>

<!-- Logotyp med roterande ring -->
<div class="logo-wrap">
<div class="ring-pulse"></div>
<div class="ring-pulse delay"></div>
<div class="ring-spin"></div>
<div class="logo-circle">
<img src="./assets/images/logo.png" alt="Atlas" class="logo-img"
onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex';" />
<span class="logo-fallback">ATLAS</span>
</div>
</div>

<!-- Namn + tagline -->
<p class="app-name">ATLAS</p>
<p class="tagline">Support &amp; Ärendehantering</p>

<!-- Inloggningssektion -->
<p class="login-hint">Logga in för att fortsätta</p>

<div class="login-form">

<!-- Användarnamn -->
<div class="input-group">
<svg class="input-icon" viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="1.8"
stroke-linecap="round" stroke-linejoin="round">
<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
<circle cx="12" cy="7" r="4"/>
</svg>
<input
type="text"
id="login-username"
class="login-input"
placeholder="Användarnamn"
autocomplete="off"
spellcheck="false"
/>
</div>

<!-- Lösenord -->
<div class="input-group">
<svg class="input-icon" viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="1.8"
stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
<path d="M7 11V7a5 5 0 0 1 10 0v4"/>
</svg>
<input
type="password"
id="login-password"
class="login-input"
placeholder="Lösenord"
/>
</div>

<!-- Felmeddelande -->
<p class="login-error" id="login-error"></p>

<!-- Knapp -->
<button id="login-btn" class="login-btn" disabled>
<span id="login-btn-text">Logga in</span>
</button>

</div>

<!-- Progress -->
<div class="progress-track">
<div class="progress-fill" id="progress-fill"></div>
</div>

<!-- Status -->
<p class="status-text" id="loader-text">Startar...</p>

<!-- Trafikljós-nick: 3 små prickar -->
<div class="dot-row">
<div class="dot red"    id="light-red"></div>
<div class="dot yellow" id="light-yellow"></div>
<div class="dot green"  id="light-green"></div>
</div>

</div>
<script src="loader.js"></script>
</body>
</html>
