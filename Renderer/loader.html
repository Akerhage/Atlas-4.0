<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="loader.css" />
  <title>Atlas</title>
</head>
<body>
  <div class="card">

    <!-- Bakgrundsglöd -->
    <div class="bg-glow"></div>

    <!-- Logotyp med roterande ring -->
    <div class="logo-wrap">
      <div class="ring-pulse"></div>
      <div class="ring-pulse delay"></div>
      <div class="ring-spin"></div>
      <div class="logo-circle">
        <img src="./assets/images/logo.png" alt="Atlas" class="logo-img"
             onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex';" />
        <span class="logo-fallback">ATLAS</span>
      </div>
    </div>

    <!-- Namn + tagline -->
    <p class="app-name">ATLAS</p>
    <p class="tagline">Support &amp; Ärendehantering</p>

    <!-- Progress -->
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Status -->
    <p class="status-text" id="loader-text">Startar...</p>

    <!-- Trafikljós-nick: 3 små prickar -->
    <div class="dot-row">
      <div class="dot red"    id="light-red"></div>
      <div class="dot yellow" id="light-yellow"></div>
      <div class="dot green"  id="light-green"></div>
    </div>

  </div>
  <script src="loader.js"></script>
</body>
</html>
